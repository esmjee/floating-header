<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCV Header - Development</title>
    <link rel="stylesheet" href="style.css">
    <!-- Development: load translations and script registry from local files (no fetch/CORS) -->
    <script src="plugins/registry.js"></script>
    <script src="plugins/script-base.js"></script>
</head>
<body>
    <script src="script.js" defer></script>
    <script defer>
        if (window.CCVToolbar && typeof window.CCVToolbar.init === 'function') {
            window.CCVToolbar.init();
        }
    </script>

    <style>
        html, body {
            background-color: #333;
            color: #fff;
            font-family: sans-serif;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: 0;
            outline: 0;
        }
    </style>
</body>
</html>
